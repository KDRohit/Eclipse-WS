spring.application.name=API-Gateway-Service
server.port=1010
# registering this security service with eureka
spring.client.register-with-eureka=true

server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=123456
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=apigateway

# routing security service
spring.cloud.gateway.server.webmvc.routes[0].id=Security-Service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://Security-Service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/security/**

# routing security test service
spring.cloud.gateway.server.webmvc.routes[1].id=Security-Test-Service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://Security-Test-Service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/security-test/**




