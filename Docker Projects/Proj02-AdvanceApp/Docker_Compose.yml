services:
 movie-app:
  build: .
  image: movie-app:1.0
  ports:
   - "8080:8080"
  depends_on:
   - mysql
   - redis
 mysql:
  image: mysql:8.4
  ports:
   - "3306:3306"
  environment:
   MYSQL_ROOT_PASSWORD: root
   MYSQL_DATABASE: ingenuity
 redis:
   image: redis:latest
   ports:
    - "6379:6379"
 grafanaK6:
  image: grafana/k6:latest
 jmeter:
  image: justb4/jmeter
  volumes:
    - ./jmeter:/tests
  command: >
   -n
   -t /tests/api-test.jmx
   -l /tests/results.jtl
   -e
   -o /tests/report
 prometheus:
  image: prom/prometheus
  volumes:
   - ./prometheus.yml:/etc/prometheus/prometheus.yml
  ports:
   - "9090:9090"
 grafana:
  image: grafana/grafana
  ports:
   - "3000:3000"