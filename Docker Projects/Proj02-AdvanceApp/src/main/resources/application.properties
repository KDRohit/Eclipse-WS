spring.application.name=advance_application

# run application on port 
server.port = 8080

# enable actuators
management.endpoints.web.exposure.include=health,info,prometheus

# Enable tracing and sample all requests
management.tracing.sampling.probability=1.0

# Send traces to Tempo via OTLP HTTP
management.tracing.enabled=true
management.tracing.service.name=movie-app-1
management.otlp.tracing.endpoint=http://tempo:4318/v1/traces
management.otlp.tracing.export.enabled=true

# Mysql Datasource Configuration
spring.datasource.url=jdbc:mysql://mysql:3306/ingenuity
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Redis Configuration
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=60000

# Connection Pool (HikariCP - default in Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# JPA/Hibernate Configuration (if using Spring Data JPA)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
